<!-- Google Fonts: Inter (body) + JetBrains Mono (headings, code) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
{{- $css := resources.Get "css/custom.css" | minify }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}">

<!-- Open Graph image -->
<meta property="og:image" content="{{ if .Params.cover.image }}{{ .Params.cover.image }}{{ else }}/images/default-og.png{{ end }}">
<meta name="twitter:card" content="summary_large_image">

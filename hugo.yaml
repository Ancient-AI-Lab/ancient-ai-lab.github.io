baseURL: "https://ancient-ai-lab.github.io/"
languageCode: en-us
title: Ancient AI Lab
theme: PaperMod

params:
  defaultTheme: dark
  disableThemeToggle: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  description: "Open-source physics research testing ancient mysteries -- acoustic levitation, Navy antigravity, pyramid power. Real FEM simulations. Honest results."
  homeInfoParams:
    Title: "We tested the Navy's antigravity patent. It's 22 orders of magnitude short."
    Content: >
      Ancient AI Lab uses FEM simulations, symbolic regression, and open-source math to test
      ancient mysteries claims -- acoustic levitation, pyramid power, Tesla, Coral Castle, and more.
      Most mechanisms fail. We report that honestly.
  socialIcons:
    - name: github
      url: "https://github.com/Ancient-AI-Lab"

  label:
    text: "Ancient AI Lab"

  comments: true

  assets:
    favicon: "/images/favicon.ico"
    disableFingerprinting: true

  customCSS:
    - css/custom.css

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: github
      name: GitHub
      url: https://github.com/Ancient-AI-Lab
      weight: 40

markup:
  highlight:
    style: dracula
    lineNos: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

baseURL: "https://ancient-ai-lab.github.io/"
languageCode: en-us
title: Ancient AI Lab
theme: PaperMod

params:
  defaultTheme: dark
  disableThemeToggle: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  description: "Using Claude Code to find the physics of the ancients. Real FEM simulations of Navy antigravity, pyramid power, acoustic levitation. Open-source math."
  homeInfoParams:
    Title: "Using Claude Code to find the physics of the ancients."
    Content: >
      FEM simulations of Navy antigravity, pyramid power, acoustic levitation, Tesla, Coral Castle,
      and more. 15 research phases. 173 passing tests. Most claims fail. We report that honestly.
      Every notebook is on GitHub.
  socialIcons:
    - name: github
      url: "https://github.com/Ancient-AI-Lab"

  label:
    text: "Ancient AI Lab"

  comments: true

  assets:
    favicon: "/images/favicon.ico"
    disableFingerprinting: true

  customCSS:
    - css/custom.css

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: github
      name: GitHub
      url: https://github.com/Ancient-AI-Lab
      weight: 40

markup:
  highlight:
    style: dracula
    lineNos: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

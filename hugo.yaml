baseURL: "https://ancient-ai-lab.github.io/"
languageCode: en-us
title: Ancient AI Lab
theme: PaperMod

params:
  defaultTheme: dark
  disableThemeToggle: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  description: "Built with Claude Code. We test ancient mysteries claims with real FEM simulations -- Navy antigravity, pyramid power, acoustic levitation. Math is open."
  homeInfoParams:
    Title: "We used Claude Code to test the Navy's antigravity patent. 22 orders of magnitude short."
    Content: >
      Ancient AI Lab is built entirely with Claude Code on a MacBook Air M4. We test ancient mysteries
      claims -- acoustic levitation, pyramid power, Tesla, Coral Castle -- with real FEM simulations.
      Most fail. Every notebook is on GitHub.
  socialIcons:
    - name: github
      url: "https://github.com/Ancient-AI-Lab"

  label:
    text: "Ancient AI Lab"

  comments: true

  assets:
    favicon: "/images/favicon.ico"
    disableFingerprinting: true

  customCSS:
    - css/custom.css

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: github
      name: GitHub
      url: https://github.com/Ancient-AI-Lab
      weight: 40

markup:
  highlight:
    style: dracula
    lineNos: false

outputs:
  home:
    - HTML
    - RSS
    - JSON
